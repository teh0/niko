# Lightweight compose for LOCAL DEV only.
# Runs just Postgres + Redis so you can `pnpm dev` and `pnpm worker` on your
# host. Use the main docker-compose.yml for real deployments.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: niko
      POSTGRES_PASSWORD: niko
      POSTGRES_DB: niko
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  pg-data:
  redis-data:
