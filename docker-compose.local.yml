# Local-dev override for docker-compose.yml.
# Used via: docker compose -f docker-compose.yml -f docker-compose.local.yml up
# (Makefile target `make up` wraps this.)
#
# Differences from production:
#   - No Caddy (no domain, no HTTPS on localhost)
#   - Web container exposes :3000 directly to the host
#   - PUBLIC_URL defaults to http://localhost:3000
services:
  caddy:
    # Disable Caddy locally by giving it a no-op command.
    profiles: ["disabled"]

  web:
    ports:
      - "3000:3000"
    environment:
      PUBLIC_URL: http://localhost:3000
